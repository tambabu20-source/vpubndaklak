name: Cập nhật dashboard VBQPPL

on:
  push:
    paths:
      - patch_latest_completion.py
      - .github/workflows/update-vbqppl-pages.yml
  schedule:
    # 16:30 hằng ngày theo giờ Việt Nam (UTC+7) = 09:30 UTC.
    - cron: "30 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cập nhật dashboard VBQPPL
        run: python patch_latest_completion.py --index index.html

      - name: Commit nếu có số liệu mới
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Không có thay đổi số liệu."
          else
            git commit -m "Tự động cập nhật dashboard VBQPPL"
            git push
          fi
