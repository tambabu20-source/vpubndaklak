name: Cập nhật dashboard VBQPPL

on:
  push:
    paths:
      - index.html
      - update_vbqppl_from_google_light.py
      - .github/workflows/update-vbqppl-pages.yml
  schedule:
    # 16:30 hằng ngày theo giờ Việt Nam (UTC+7) = 09:30 UTC.
    - cron: "30 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vbqppl-dashboard-update
  cancel-in-progress: false

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rà soát nguồn Google Docs và cập nhật dashboard
        shell: bash
        run: |
          set -euo pipefail
          python update_vbqppl_from_google_light.py --index index.html --allow-source-failure

      - name: Kiểm tra dashboard sau cập nhật
        shell: bash
        run: |
          set -euo pipefail
          test -s index.html
          grep -q "Dashboard theo dõi xử lý danh mục văn bản QPPL" index.html
          grep -q 'id="dataset"' index.html
          grep -q 'id="completedDataset"' index.html
          grep -q 'id="updatesDataset"' index.html
          grep -q "Tóm tắt tiến độ xử lý" index.html
          grep -q "Cập nhật tiến độ mới nhất" index.html
          echo "Dashboard VBQPPL đang sẵn sàng."

      - name: Commit và đẩy lên GitHub nếu có số liệu mới
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Không có thay đổi số liệu để đẩy lên GitHub."
          else
            git commit -m "Tự động cập nhật dashboard VBQPPL từ Google Docs"
            git push
          fi
