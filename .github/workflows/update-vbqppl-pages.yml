name: Cập nhật dashboard VBQPPL

on:
  push:
    paths:
      - index.html
      - payload/vbqppl_dashboard_gzip_*.txt
      - .github/workflows/update-vbqppl-pages.yml
  schedule:
    # 16:30 hằng ngày theo giờ Việt Nam (UTC+7) = 09:30 UTC.
    - cron: "30 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Kiểm tra dashboard và dữ liệu
        shell: bash
        run: |
          set -euo pipefail
          test -s index.html
          grep -q "syncProgressDate" index.html
          grep -q "payload/vbqppl_dashboard_gzip_10.txt" index.html
          for i in $(seq -w 1 10); do
            file="payload/vbqppl_dashboard_gzip_${i}.txt"
            test -s "$file"
          done
          echo "Dashboard VBQPPL và các gói dữ liệu đang sẵn sàng."

      - name: Ghi nhận kết quả
        run: |
          echo "Dashboard được GitHub Pages phục vụ từ index.html và thư mục payload/."
          echo "Không chạy patch_latest_completion.py vì đây là cơ chế dữ liệu cũ."
