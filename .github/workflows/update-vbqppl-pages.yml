name: Cập nhật dashboard VBQPPL

on:
  push:
    paths:
      - index.html
      - .github/workflows/update-vbqppl-pages.yml
  schedule:
    # 16:30 hằng ngày theo giờ Việt Nam (UTC+7) = 09:30 UTC.
    # Dòng kiểm tra tự động: 19/7/2026.
    - cron: "30 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Kiểm tra dashboard VBQPPL
        shell: bash
        run: |
          set -euo pipefail
          test -s index.html
          grep -q "Dashboard theo dõi xử lý danh mục văn bản QPPL" index.html
          grep -q 'id="dataset"' index.html
          grep -q 'id="completedDataset"' index.html
          grep -q 'id="updatesDataset"' index.html
          grep -q "Tóm tắt tiến độ xử lý" index.html
          grep -q "Cập nhật tiến độ mới nhất" index.html
          echo "Dashboard VBQPPL đang sẵn sàng."

      - name: Ghi nhận kết quả
        run: |
          echo "Dashboard được GitHub Pages phục vụ từ file index.html."
          echo "Đã bỏ cơ chế patch_latest_completion.py cũ để tránh lỗi giải nén dữ liệu."
