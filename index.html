<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard theo dõi xử lý danh mục văn bản QPPL - Tỉnh Đắk Lắk</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f6f8fb;color:#172033;display:grid;min-height:100vh;place-items:center}
    .box{max-width:560px;margin:24px;padding:24px;border:1px solid #d9e0ea;border-radius:12px;background:#fff;box-shadow:0 16px 40px rgba(15,23,42,.08)}
    h1{font-size:20px;margin:0 0 8px}
    p{margin:0;color:#667085;line-height:1.5}
  </style>
</head>
<body>
  <div class="box">
    <h1>Đang mở dashboard VBQPPL...</h1>
    <p>Vui lòng chờ vài giây để tải dữ liệu dashboard mới nhất.</p>
  </div>
  <script>
    const CHUNKS = [
      "payload/vbqppl_dashboard_gzip_01.txt",
      "payload/vbqppl_dashboard_gzip_02.txt",
      "payload/vbqppl_dashboard_gzip_03.txt",
      "payload/vbqppl_dashboard_gzip_04.txt",
      "payload/vbqppl_dashboard_gzip_05.txt",
      "payload/vbqppl_dashboard_gzip_06.txt",
      "payload/vbqppl_dashboard_gzip_07.txt",
      "payload/vbqppl_dashboard_gzip_08.txt",
      "payload/vbqppl_dashboard_gzip_09.txt",
      "payload/vbqppl_dashboard_gzip_10.txt"
    ];

    async function inflateDashboard() {
      if (!("DecompressionStream" in window)) {
        throw new Error("Trình duyệt chưa hỗ trợ giải nén dashboard tự động.");
      }
      const b64 = (await Promise.all(CHUNKS.map(async path => {
        const res = await fetch(path + "?v=20260717-3", { cache: "no-store" });
        if (!res.ok) throw new Error("Không tải được " + path);
        return (await res.text()).trim();
      }))).join("");
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
      const html = await new Response(stream).text();
      document.open();
      document.write(html);
      document.close();
    }

    inflateDashboard().catch(err => {
      document.body.innerHTML = '<div class="box"><h1>Chưa mở được dashboard</h1><p>' +
        err.message + '<br>Vui lòng tải lại trang hoặc mở bằng Chrome/Safari phiên bản mới.</p></div>';
      console.error(err);
    });
  </script>
</body>
</html>
